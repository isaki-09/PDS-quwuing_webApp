<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Queue Display</title>
  <link rel="stylesheet" href="View.css">
</head>
<body>

<div class="header">
<div class="top-bar">
  <div class="logo-section">
    <img src="assets/psd-logo-landscape-planet_no_bkg.png" alt="logo" class="logo">
  </div>
<!-- <h1 id="greetingText">Good Morning</h1> -->
  <div class="time-box">
  <div id="dayDate">Monday, Jan 1</div>
  <div>
    <span id="time">12:00</span>
    <span id="ampm">PM</span>
  </div>
</div>
</div>
<div class="display-container">

  <div class="left-panel">
  <h2>Now Ready...</h2>

  <div class="ready-container">
    
    <!-- REGULAR -->
   <div class="ready-card white" id="regularCard">
      <div id="regularServing">--</div>
      <h3>Regular Patient</h3>
      <!-- <p>Please proceed to counter</p> -->
    </div>

    <!-- PRIORITY -->
    <div class="ready-card red" id="priorityCard">
      <div id="priorityServing">--</div>
      <h3>Priority Patient</h3>
      <!-- <p>Please proceed to counter</p> -->
    </div>

  </div>
</div>

  <!-- RIGHT SIDE -->
  <div class="right-panel">
    <h2>Now Preparing...</h2>

   <div id="queueList" class="queue-list"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
