<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Queue Admin</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="admin-body">

<!-- TOP BAR (GLOBAL) -->
<div class="top-bar">
  <div class="logo-section">
    <img src="assets/PLDS_Logo_inLine_copy.png" alt="logo" class="logo">
  </div>

<div class="admin-container">
  <div class="left-panel">
  <h1 class="greeting">Good Morning</h1>

    <!-- REGULAR HEADER -->
    <div class="section-header">
      <p class="section-title">Regular Queue...</p>

      <button onclick="resetQueue()" class="reset-btn">
        RESET
      </button>
    </div>

    <!-- REGULAR CARD -->
    <div class="queue-row">
      <div class="queue-card white" onclick="callCurrent('regular')">
        <div class="number" id="regularNow">01</div>

        <div class="label">
          <h3>Regular Patient</h3>
          <p>Tap to Call</p>
        </div>
      </div>

      <button class="next-btn" onclick="nextQueue('regular')">
        ➜
      </button>
    </div>

    <!-- PRIORITY HEADER -->
    <p class="section-title">Priority Queue...</p>

    <!-- PRIORITY CARD -->
    <div class="queue-row">
      <div class="queue-card red" onclick="callCurrent('priority')">
        <div class="number" id="priorityNow">01</div>

        <div class="label">
          <h3>Priority Patient</h3>
          <p>Tap to Call</p>
        </div>
      </div>

      <button class="next-btn" onclick="nextQueue('priority')">
        ➜
      </button>
    </div>

  <!-- <div class="print-section">
  <h3>Print Number</h3>

  <div class="button-group">
    <button onclick="printLatest('regular')" class="btn white-btn">
      ADD <br><small>Regular Patient</small>
    </button>

    <button onclick="printLatest('priority')" class="btn red-btn">
      ADD <br><small>Priority Patient</small>
    </button>
  </div>
</div> -->



  </div>


  <!-- RIGHT SIDE -->
  <div class="right-panel">

    <!-- TIME -->
    <div class="time-box">
      <span id="time">12:00</span>
      <span id="ampm">PM</span>
    </div>

    <!-- ADD BUTTONS -->
    <h3>Add Print Button.</h3>
    <div class="button-group">

      <button onclick="addQueue('regular')" class="btn white-btn">
        ADD <br><small>Regular Patient</small>
      </button>

      <button onclick="addQueue('priority')" class="btn red-btn">
        ADD <br><small>Priority Patient</small>
      </button>

    </div>
    
    <!-- QUEUE LIST -->
    <h3>Queue List...</h3>
    <div id="adminQueue" class="queue-list"></div>

  </div>

  

</div>

<script src="script.js"></script>

</body>
</html>
